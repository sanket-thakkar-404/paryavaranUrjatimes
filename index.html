<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Certificate Generator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f6f9;
        padding: 20px;
      }

      .container {
        max-width: 1100px;
        margin: auto;
      }

      .preview {
        background: white;
        border-radius: 14px;
        padding: 15px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      canvas {
        width: 100%;
        border-radius: 10px;
      }

      .popup {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      .popup-box {
        width: 90%;
        max-width: 420px;
        background: white;
        border-radius: 18px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .popup-box h2 {
        margin-bottom: 15px;
      }

      .popup-box p {
        font-size: 14px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 18px;
      }

      .popup-box input {
        width: 100%;
        padding: 14px;
        border: 1px solid #ccc;
        border-radius: 10px;
        margin-bottom: 15px;
        font-size: 16px;
        outline: none;
      }

      .popup-box input:focus {
        border-color: #0b57d0;
      }

      .name {
        min-height: 35px;
        font-size: 22px;
        font-weight: bold;
        color: #0b57d0;
        margin-bottom: 20px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #0b57d0;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #0847ad;
      }

      #successMessage {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #16a34a;
        color: white;
        padding: 22px 30px;
        border-radius: 14px;
        font-size: 20px;
        font-weight: bold;
        z-index: 9999;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <!-- POPUP -->
    <div class="popup" id="popup">
      <div class="popup-box">
        <h2>Download Certificate</h2>

        <p>Enter participant access phone number</p>

        <!-- PHONE -->
        <input
          type="text"
          id="phoneInput"
          placeholder="Enter your phone number"
          maxlength="10"
        />

        <!-- NAME -->
        <input
          type="text"
          id="nameInput"
          placeholder="Enter your full name"
          style="display: none"
        />

        <!-- LIVE NAME PREVIEW -->
        <div class="name" id="userName"></div>

        <button id="downloadBtn">Download Certificate</button>
      </div>
    </div>

    <!-- CERTIFICATE -->
    <div class="container">
      <div class="preview">
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <!-- SUCCESS -->
    <div id="successMessage">✅ Certificate Downloaded Successfully</div>

            const participants = [
              ...new Set(
                rawNumbers
                  .split("\n")
                  .map((num) => num.replace(/\D/g, "")) // remove spaces/symbols
                  .filter((num) => num.length === 10), // only valid 10 digit numbers
            ),
            ];

            /* =========================
             GOOGLE SHEET URL
          ========================= */

            const GOOGLE_SCRIPT_URL =
              "https://script.google.com/macros/s/AKfycbyhD4jXWHdfehENX0SCLL7qva6yvn7q3ij6_02XNbUEGYwaURt2-NMhSjV0IUPewvwhpw/exec";

          /* =========================
             ELEMENTS
          ========================= */

            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            const popup = document.getElementById("popup");

            const phoneInput = document.getElementById("phoneInput");
            const nameInput = document.getElementById("nameInput");

            const userName = document.getElementById("userName");

            const downloadBtn = document.getElementById("downloadBtn");

            const successMessage = document.getElementById("successMessage");

            /* =========================
             VARIABLES
          ========================= */

            let currentName = "";

            let certificateNumber = 201;

            /* =========================
             CERTIFICATE IMAGE
          ========================= */

            const baseImage = new Image();

            baseImage.crossOrigin = "anonymous";

            baseImage.src =
              "https://res.cloudinary.com/dqkhxvne2/image/upload/v1780640955/PHOTO-2026-06-05-11-22-42_kbgn4e.jpg";

            baseImage.onload = function () {
              canvas.width = baseImage.width;

              canvas.height = baseImage.height;

              redraw();
            };

            /* =========================
             PHONE CHECK
          ========================= */

            phoneInput.addEventListener("input", function () {
              const phone = phoneInput.value.trim();

              if (participants.includes(phone)) {
                nameInput.style.display = "block";
              } else {
                nameInput.style.display = "none";

                nameInput.value = "";

                currentName = "";

                userName.innerText = "";

                redraw();
              }
            });

            /* =========================
             NAME INPUT
          ========================= */

            nameInput.addEventListener("input", function () {
              currentName = nameInput.value.trim();

              userName.innerText = currentName;

              redraw();
            });

            /* =========================
             CERTIFICATE ID
          ========================= */

            function getCertificateID() {
              return `WED/2026/${certificateNumber}`;
            }

            /* =========================
             FIT TEXT
          ========================= */

            function fitText(text, maxWidth, startSize) {
              let size = startSize;

              while (size > 10) {
                ctx.font = `bold ${size}px serif`;

                if (ctx.measureText(text).width <= maxWidth) {
                  return size;
                }

                size--;
              }

              return size;
            }

            /* =========================
             DRAW CERTIFICATE
          ========================= */

            function redraw() {
              if (!baseImage.complete) return;

              ctx.clearRect(0, 0, canvas.width, canvas.height);

              ctx.drawImage(baseImage, 0, 0);

              /* NAME */

              if (currentName) {
                const fontSize = fitText(currentName, canvas.width * 0.7, 50);

                ctx.font = `bold ${fontSize}px serif`;

                ctx.fillStyle = "#1111aa";

                ctx.textAlign = "center";

                ctx.textBaseline = "middle";

                ctx.fillText(currentName, canvas.width * 0.51, canvas.height * 0.49);
              }

              /* CERTIFICATE ID */

              ctx.font = "bold 30px Arial";

              ctx.fillStyle = "#38b000";

              ctx.textAlign = "left";

              ctx.fillText(
                getCertificateID(),
                canvas.width * 0.52,
                canvas.height * 0.05,
              );
            }

            /* =========================
             SAVE RECORD
          ========================= */

            async function saveRecord(phone, name) {
              try {
                await fetch(GOOGLE_SCRIPT_URL, {
                  method: "POST",

                  mode: "no-cors",

                  headers: {
                    "Content-Type": "application/json",
                  },

                  body: JSON.stringify({
                    phone: phone,

                    name: name,
                    certificateId : getCertificateID(),

                    time: new Date().toLocaleString(),
                  }),
                });
              } catch (error) {
                console.log("Record Save Error", error);
              }
            }

            /* =========================
             DOWNLOAD
          ========================= */

            downloadBtn.addEventListener("click", async function () {
              const phone = phoneInput.value.trim();

              /* INVALID NUMBER */

              if (!participants.includes(phone)) {
                alert("Invalid phone number");

                return;
              }

              /* EMPTY NAME */

              if (!currentName) {
                alert("Please enter your name");

                return;
              }

              /* ALREADY DOWNLOADED */

              const alreadyDownloaded = localStorage.getItem("downloaded_" + phone);

              if (alreadyDownloaded) {
                alert("Certificate already downloaded");

                return;
              }

              redraw();

              /* DOWNLOAD */

              const link = document.createElement("a");

              link.download = `${currentName.replace(/\s+/g, "_")}.png`;

              link.href = canvas.toDataURL("image/png");

              link.click();

              /* SAVE TO SHEET */

              await saveRecord(phone, currentName);

              /* STORE */

              localStorage.setItem("downloaded_" + phone, "true");

              /* UI */

              popup.classList.add("hidden");

              successMessage.style.display = "block";
            });
    </script>
  </body>
</html>
